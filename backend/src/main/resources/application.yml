spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/pos_db
    username: pos_user
    password: pos_password
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:4173,http://127.0.0.1:5173}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long-xxxx}
  staff-expiry-hours: 15
  admin-expiry-hours: 8

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.pos.app: INFO
    org.springframework.web.socket: INFO
