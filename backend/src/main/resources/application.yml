spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/fishchips_pos}
    username: ${DATABASE_USER:pos_user}
    password: ${DATABASE_PASSWORD:pos_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long-xxxx}
  staff-expiry-hours: 15
  admin-expiry-hours: 8

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.pos.fishchips: DEBUG
    org.springframework.web.socket: INFO
